<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::title}, ~{::content}, ~{::scripts})}">
<head>
    <title>在线投票系统 - 首页</title>
</head>
<body>
    <th:block th:fragment="content">
        <div class="hero">
            <h1><i class="fas fa-poll"></i> 在线投票系统</h1>
            <p class="subtitle">创建、参与和管理各种主题的投票</p>
            <a th:href="@{/create}" class="btn btn-primary">
                <i class="fas fa-plus"></i> 创建新投票
            </a>
        </div>

        <div class="section-header">
            <h2><i class="fas fa-fire"></i> 热门投票</h2>
            <p>参与以下热门投票，表达你的观点</p>
        </div>

        <div th:if="${not #lists.isEmpty(polls)}" class="poll-grid">
            <div th:each="poll : ${polls}" class="poll-card">
                <div class="poll-card-header">
                    <h3 th:text="${poll.title}"></h3>
                    <span th:classappend="${poll.active} ? 'active' : 'inactive'" class="poll-status">
                        <i class="fas fa-circle"></i>
                        <span th:text="${poll.active} ? '进行中' : '已结束'"></span>
                    </span>
                </div>
                
                <div class="poll-card-body">
                    <p th:if="${poll.description}" class="poll-description" th:text="${poll.description}"></p>
                    
                    <div class="poll-meta">
                        <span><i class="far fa-calendar"></i> 
                            <span th:text="${#dates.format(poll.createdAt, 'yyyy-MM-dd')}"></span>
                        </span>
                        <span><i class="far fa-list-alt"></i> 
                            <span th:text="${poll.options.size()}"></span> 个选项
                        </span>
                    </div>
                </div>
                
                <div class="poll-card-footer">
                    <a th:href="@{/poll/{id}(id=${poll.id})}" class="btn btn-outline">
                        <i th:classappend="${poll.active} ? 'fas fa-vote-yea' : 'fas fa-chart-bar'"></i>
                        <span th:text="${poll.active} ? '立即投票' : '查看结果'"></span>
                    </a>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(polls)}" class="empty-state">
            <i class="fas fa-poll-h fa-3x"></i>
            <h3>暂无投票</h3>
            <p>还没有人创建投票，快来创建第一个吧！</p>
            <a th:href="@{/create}" class="btn btn-primary">
                <i class="fas fa-plus"></i> 创建投票
            </a>
        </div>

        <div class="features">
            <div class="feature">
                <i class="fas fa-bolt fa-2x"></i>
                <h3>快速创建</h3>
                <p>简单几步即可创建新的投票主题</p>
            </div>
            <div class="feature">
                <i class="fas fa-shield-alt fa-2x"></i>
                <h3>安全可靠</h3>
                <p>防止重复投票，确保结果公正</p>
            </div>
            <div class="feature">
                <i class="fas fa-chart-line fa-2x"></i>
                <h3>实时统计</h3>
                <p>投票结果实时更新，图表直观展示</p>
            </div>
        </div>
    </th:block>

    <th:block th:fragment="scripts">
        <!-- 首页特定脚本 -->
    </th:block>
</body>
</html>
