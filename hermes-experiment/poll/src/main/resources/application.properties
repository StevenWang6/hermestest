# Server Configuration
server.port=8080
server.servlet.context-path=/

# Spring Configuration
spring.application.name=Hermes Poll System

# Database Configuration
spring.datasource.url=jdbc:h2:file:./data/poll_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Database Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Logging Configuration
logging.level.com.hermes.poll=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# Application Properties
app.name=Hermes Online Poll System
app.version=1.0.0
app.description=A simple online voting system for Hermes Experiment